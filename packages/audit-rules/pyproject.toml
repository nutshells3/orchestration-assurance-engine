[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "formal-claim-audit-rules"
version = "0.1.0"
description = "Deterministic assurance-profile computation rules for Formal Claim."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.12,<3",
]

[tool.hatch.build.targets.wheel]
packages = ["src/formal_claim_audit_rules"]
