[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "formal-claim-contracts-py"
version = "1.0.0"
description = "Canonical generated Python bindings for Formal Claim schemas."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.12,<3",
]

[tool.hatch.build.targets.wheel]
packages = ["src/formal_claim_contracts"]
