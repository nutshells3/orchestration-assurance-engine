name: Bug Report
description: Report a defect or regression in the canonical monorepo or its migration path.
title: "[Bug] "
labels:
  - tests
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - services/engine
        - proof boundary (FWP / proof-assistant)
        - services/mcp-server
        - packages/contracts
        - packages/contracts-py
        - packages/graph-model
        - packages/audit-rules
        - packages/evidence-connectors
        - apps/cli
        - scripts/github
        - repo-root
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Failing command
      placeholder: just test
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the smallest deterministic reproduction you have.
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Logs or artifacts
      description: Paste stack traces, JSON outputs, or generated artifact paths if relevant.
